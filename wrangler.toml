name = "discordapi-ad-server"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[triggers]
crons = ["0 * * * *"]

[[unsafe.bindings]]
name = "SERVE_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[[unsafe.bindings]]
name = "CLICK_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

[env.staging]
name = "discordapi-ad-server-staging"

[env.staging.triggers]
crons = ["0 * * * *"]

[[env.staging.unsafe.bindings]]
name = "SERVE_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[[env.staging.unsafe.bindings]]
name = "CLICK_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

[env.production]
name = "discordapi-ad-server"

[env.production.triggers]
crons = ["0 * * * *"]

[[env.production.unsafe.bindings]]
name = "SERVE_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[[env.production.unsafe.bindings]]
name = "CLICK_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }
